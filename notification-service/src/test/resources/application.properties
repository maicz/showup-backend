# Database configurations for testing with H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable Fluxnova job executor for testing async processes
fluxnova.bpm.job-execution.enabled=true
fluxnova.bpm.job-execution.deployment-aware=false
