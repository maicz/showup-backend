spring.application.name=user-service-test

# Use in-memory H2 database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Disable job execution during test context load
fluxnova.bpm.job-execution.enabled=false

# JWT Secret for testing
jwt.secret=testjwtsecretkeythatmustbeatleast256bitslongforsecurityreasons!
jwt.expiration-ms=3600000

# Disable process engine JMX MBean registration to avoid conflicts in tests
fluxnova.bpm.register-process-engine-m-bean=false
camunda.bpm.register-process-engine-m-bean=false
