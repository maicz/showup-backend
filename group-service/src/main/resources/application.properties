spring.application.name=group-service
server.port=8082
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
fluxnova.bpm.job-execution.deployment-aware=true
fluxnova.bpm.job-execution.enabled=true

# JPA/Hibernate Configs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT Security Configs
jwt.secret=showupjwtsecretkeythatmustbeatleast256bitslongforsecurityreasons!
jwt.expiration-ms=86400000

# gRPC Server Config
grpc.server.port=9082


